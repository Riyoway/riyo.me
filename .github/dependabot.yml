version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 5
    rebase-strategy: auto
    commit-message:
      prefix: deps
      include: scope
    groups:
      next:
        patterns:
          - next
          - eslint-config-next
      react:
        patterns:
          - react
          - react-dom
          - "@types/react"
          - "@types/react-dom"
      tooling:
        dependency-type: development
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "09:30"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 3
    rebase-strategy: auto
    commit-message:
      prefix: ci
      include: scope
